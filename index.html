<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="SSC WAR">
<title>SSC CGL 2026 — War Plan</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --ink:#0a0a0a;--paper:#f5f0e8;--yellow:#facc15;--orange:#f97316;
  --red:#ef4444;--green:#16a34a;--blue:#1d4ed8;--purple:#7c3aed;
  --amber:#d97706;--teal:#0d9488;--pink:#db2777;--slate:#475569;
  --card:#fffdf7;--border:#e2d9c8;--muted:#9ca3af;--faint:#f9f5ec;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}

html,body{
  background:var(--paper);color:var(--ink);
  font-family:'DM Mono',monospace;min-height:100vh;
  overscroll-behavior:none;
}

/* ── HEADER ─────────────────────────────────── */
#hdr{
  position:sticky;top:0;z-index:100;
  background:var(--ink);
  padding:0 16px;
  border-bottom:3px solid var(--yellow);
}
.hdr-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0 6px;
}
.hdr-left .tag{font-size:8px;letter-spacing:3px;color:var(--yellow);font-weight:500;}
.hdr-left .title{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  color:#fff;letter-spacing:2px;line-height:1;
}
.hdr-right{text-align:right;}
.hdr-pct{
  font-family:'Orbitron',monospace;font-size:26px;font-weight:900;
  color:var(--yellow);line-height:1;
}
.hdr-sub{font-size:9px;color:var(--muted);margin-top:2px;}

.master-bar{height:3px;background:#1f1f1f;margin:0 -16px;}
.master-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));transition:width .5s cubic-bezier(.4,0,.2,1);}

.tabs{display:flex;gap:0;margin:0 -16px;border-top:1px solid #222;}
.tab{
  flex:1;padding:10px 4px 8px;
  font-size:9px;font-weight:500;letter-spacing:1.5px;
  color:var(--muted);background:var(--ink);border:none;
  border-bottom:2px solid transparent;transition:all .2s;
  cursor:pointer;
}
.tab.on{color:var(--yellow);border-bottom-color:var(--yellow);}

/* ── MAIN ───────────────────────────────────── */
#main{padding:14px 14px 80px;max-width:480px;margin:0 auto;}

/* ── DAY GRID ───────────────────────────────── */
.grid-label{font-size:8px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;font-weight:500;}
.day-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-bottom:16px;}
.dg-btn{
  aspect-ratio:1;border-radius:6px;font-size:10px;font-weight:700;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--muted);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.dg-btn.sel{background:var(--ink);border-color:var(--ink);color:var(--yellow);}
.dg-btn.done{background:#dcfce7;border-color:#86efac;color:#16a34a;}
.dg-btn.part{background:#fef9c3;border-color:#fde047;color:#854d0e;}
.dg-btn.mock::after{content:'★';position:absolute;font-size:6px;top:1px;right:2px;color:var(--orange);}
.dg-btn{position:relative;}

/* ── DAY CARD ───────────────────────────────── */
.day-card{
  background:var(--ink);border-radius:16px;padding:16px;
  margin-bottom:14px;position:relative;overflow:hidden;
}
.day-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(250,204,21,.15),transparent 70%);
  pointer-events:none;
}
.dc-eyebrow{font-size:8px;letter-spacing:3px;color:var(--muted);margin-bottom:4px;}
.dc-title{
  font-family:'Bebas Neue',sans-serif;font-size:26px;
  color:#fff;letter-spacing:1px;line-height:1.1;margin-bottom:12px;
}
.dc-title span{font-size:14px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0;}
.dc-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.dc-pct{
  font-family:'Orbitron',monospace;font-size:32px;font-weight:900;
  color:var(--yellow);line-height:1;
}
.dc-total{font-size:10px;color:var(--muted);line-height:1.4;}
.dc-bar{height:4px;background:#1f1f1f;border-radius:4px;overflow:hidden;margin-bottom:14px;}
.dc-fill{height:100%;border-radius:4px;background:var(--yellow);transition:width .4s;}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.stat-pill{border-radius:8px;padding:7px 4px;text-align:center;border:1px solid;}
.stat-pill .sv{font-size:11px;font-weight:700;font-family:'Orbitron',monospace;}
.stat-pill .sl{font-size:7px;letter-spacing:1px;margin-top:2px;opacity:.8;}

/* ── SECTION ────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sec-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.sec-lbl{font-size:8px;letter-spacing:2px;font-weight:700;}
.sec-ct{font-size:8px;color:var(--muted);margin-left:auto;}

/* ── LECTURE ITEM ───────────────────────────── */
.lec-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.lec{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--card);
  cursor:pointer;transition:all .18s;
  -webkit-user-select:none;user-select:none;
}
.lec:active{transform:scale(.97);}
.lec.done{opacity:.5;background:var(--faint);}
.lec.done .ln{text-decoration:line-through;color:var(--muted);}

.chk{
  width:22px;height:22px;border-radius:6px;
  border:2px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;font-size:12px;font-weight:700;
}
.chk.on{color:#fff;}

.accent-bar{width:3px;border-radius:2px;flex-shrink:0;}
.lec-body{flex:1;min-width:0;}
.ln{font-size:12px;font-weight:700;line-height:1.3;transition:all .18s;}
.ls{font-size:10px;color:var(--muted);margin-top:2px;}
.lt{font-size:11px;font-weight:700;flex-shrink:0;}

/* ── SPECIAL ITEMS ──────────────────────────── */
.special-lec{
  background:var(--ink);border-color:var(--ink);
  border-radius:12px;
}
.special-lec .ln{color:#fff;}
.special-lec .ls{color:var(--muted);}

.eng-lec{background:linear-gradient(135deg,#f0fdf4,#dcfce7);}
.empty-note{
  padding:12px 14px;border-radius:10px;
  background:var(--faint);border:1.5px dashed var(--border);
  font-size:11px;color:var(--muted);text-align:center;
}
.mock-badge{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:10px;
  background:#fff7ed;border:1.5px solid #fed7aa;
  margin-bottom:18px;font-size:11px;color:#9a3412;font-weight:700;
}

/* ── NAV ────────────────────────────────────── */
.nav-row{display:flex;gap:8px;margin-top:4px;}
.nav-prev,.nav-next{
  flex:1;padding:14px;border-radius:12px;
  font-size:13px;font-weight:700;cursor:pointer;border:none;
  font-family:'DM Mono',monospace;transition:all .15s;
}
.nav-prev{background:var(--faint);color:var(--ink);border:1.5px solid var(--border);}
.nav-next{background:var(--ink);color:var(--yellow);}
.nav-next:active,.nav-prev:active{transform:scale(.97);}

/* ── TIMETABLE ──────────────────────────────── */
.tt-hero{
  background:var(--ink);border-radius:16px;
  padding:16px;margin-bottom:14px;
}
.tt-hero-tag{font-size:8px;letter-spacing:3px;color:var(--yellow);margin-bottom:4px;}
.tt-hero-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;letter-spacing:1px;margin-bottom:4px;}
.tt-hero-sub{font-size:10px;color:var(--muted);line-height:1.5;}
.speed-badge{
  display:inline-block;margin-top:8px;padding:4px 10px;
  background:#1f2937;border-radius:20px;
  font-size:9px;font-weight:700;color:var(--yellow);letter-spacing:1px;
}

.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.leg{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}

.tt-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.tt-row{
  display:flex;gap:10px;padding:10px 12px;
  border-radius:10px;border:1.5px solid;
}
.tt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.tt-slot{font-size:8px;opacity:.6;font-weight:500;margin-bottom:2px;}
.tt-act{font-size:11px;font-weight:700;}

.rules-box{
  background:#fff1f2;border:1.5px solid #fecdd3;
  border-radius:14px;padding:14px;
}
.rules-tag{font-size:8px;letter-spacing:2px;color:var(--red);font-weight:700;margin-bottom:10px;}
.rule{display:flex;gap:8px;font-size:10px;color:#9f1239;margin-bottom:7px;line-height:1.5;}
.rn{color:var(--red);font-weight:700;flex-shrink:0;}

/* ── PROGRESS ───────────────────────────────── */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.ov-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:14px;padding:14px;text-align:center;
}
.ov-val{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;line-height:1;}
.ov-lbl{font-size:9px;letter-spacing:1px;color:var(--muted);margin-top:4px;}
.ov-sub{font-size:9px;color:var(--muted);margin-top:2px;}

.prog-section-lbl{font-size:8px;letter-spacing:2px;font-weight:700;margin-bottom:8px;margin-top:16px;}
.prog-item{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;padding:10px 12px;margin-bottom:6px;
}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-name-row{display:flex;align-items:center;gap:6px;}
.prog-dot{width:7px;height:7px;border-radius:50%;}
.prog-name{font-size:11px;font-weight:700;}
.prog-count{font-size:11px;font-weight:700;}
.prog-bar{height:5px;background:var(--border);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;transition:width .4s;}
.prog-sub{font-size:9px;color:var(--muted);margin-top:4px;}

.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.r-card{
  padding:9px 10px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--card);
}
.r-card.rdone{background:#f0fdf4;border-color:#86efac;}
.r-name{font-size:10px;font-weight:700;margin-bottom:2px;}
.r-day{font-size:9px;color:var(--muted);}

.eng-grid{display:flex;flex-wrap:wrap;gap:4px;}
.eng-sq{
  width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:var(--muted);background:var(--card);
}
.eng-sq.done{background:#dcfce7;border-color:#86efac;color:#16a34a;}

/* ── COMPLETE FLASH ─────────────────────────── */
@keyframes flash{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
.flash{animation:flash .3s ease;}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.chk.on{animation:pop .25s ease;}
</style>
</head>

// ============ UTILS ============
function fmt(m){
  if(!m)return'—';
  const h=Math.floor(m/60),mn=m%60;
  return h>0?(mn>0?`${h}h${mn}m`:`${h}h`):`${mn}m`;
}
function dayKeys(d){
  return[
    ...d.q.map(q=>`q_${q[0]}_${q[1]}`),
    ...d.g.map(g=>`g_${g[0]}_${g[1]}`),
    ...(d.r?[`r_${d.r}`]:[]),
    `eng_${d.day}`
  ];
}
function overall(){
  let tot=0,dn=0;
  PLAN.forEach(d=>{const ks=dayKeys(d);tot+=ks.length;dn+=ks.filter(k=>chk[k]).length;});
  return{tot,dn,pct:tot?Math.round(dn/tot*100):0};
}
function doneCount(){return PLAN.filter(d=>{const ks=dayKeys(d);return ks.length>0&&ks.every(k=>chk[k]);}).length;}

// ============ TOGGLE ============
function tog(k,el){
  chk[k]=!chk[k];save();
  // Update just this element for snappiness
  const chkEl=el.querySelector('.chk');
  const lnEl=el.querySelector('.ln');
  if(chk[k]){
    el.classList.add('done');
    chkEl.classList.add('on');
    chkEl.innerHTML='✓';
  } else {
    el.classList.remove('done');
    chkEl.classList.remove('on');
    chkEl.innerHTML='';
  }
  renderHeader();
  // Update day grid button
  updateDayBtn(sel);
}

function switchTab(t){
  curTab=t;
  ['tracker','timetable','progress'].forEach(x=>{
    document.getElementById('t-'+x).classList.toggle('on',x===t);
  });
  renderMain();
}

function updateDayBtn(d){
  const btn=document.getElementById('dg'+d);

  const pd=PLAN[d-1];

  const part=!done&&ks.some(k=>chk[k]);
  btn.className='dg-btn'+(pd.mock?' mock':'')+(d===sel?' sel':done?' done':part?' part':'');
}

      <div class="chk${chk[ek]?' on':''}" style="${chk[ek]?'background:#16a34a;border-color:#16a34a':'border-color:#bbf7d0'}">
        ${chk[ek]?'✓':''}</div>
      <div class="accent-bar" style="background:#10b981;height:44px"></div>
      <div class="lec-body">
        <div class="ln${chk[ek]?' done':''}">Daily English Session</div>
        <div class="ls">25 vocab · 30 error detection · 2 RC passages · PYQs</div>
      </div>
      <div class="lt" style="color:#16a34a">1h30m</div>
    </div>
  </div>`;

  // Nav
  const nav=`<div class="nav-row">
    ${sel>1?`<button class="nav-prev" onclick="goDay(${sel-1})">← Day ${sel-1}</button>`:''}
    ${sel<50?`<button class="nav-next" onclick="goDay(${sel+1})">Day ${sel+1} →</button>`:''}
  </div>`;

  return g+card+mock+qHTML+gHTML+rHTML+eHTML+nav;
}

// Global toggle handler (no re-render needed)
function handleTog(el){
  const k=el.dataset.key;
  chk[k]=!chk[k]; save();
  const chkEl=el.querySelector('.chk');
  if(chk[k]){
    el.classList.add('done');
    chkEl.classList.add('on');
    chkEl.innerHTML='✓';
    // derive color from style
    const accent=el.querySelector('.accent-bar');
    if(accent){const col=accent.style.background;chkEl.style.background=col;chkEl.style.borderColor=col;}
  } else {
    el.classList.remove('done');
    chkEl.classList.remove('on');
    chkEl.innerHTML='';
    chkEl.style.background='';
    const accent=el.querySelector('.accent-bar');
    if(accent){chkEl.style.borderColor=accent.style.background+'33';}
  }
  renderHeader();
  updateDayBtn(sel);
}

// ============ TIMETABLE ============
function renderTimetable(){
  const typeStyle={
    q:{bg:'#eff6ff',border:'#bfdbfe',dot:'#3b82f6'},
    gk:{bg:'#fffbeb',border:'#fde68a',dot:'#f59e0b'},
    r:{bg:'#faf5ff',border:'#ddd6fe',dot:'#7c3aed'},
    eng:{bg:'#f0fdf4',border:'#bbf7d0',dot:'#16a34a'},
    pyq:{bg:'#fff1f2',border:'#fecdd3',dot:'#ef4444'},
    rev:{bg:'#f8fafc',border:'#e2e8f0',dot:'#475569'},
    brk:{bg:'#fafafa',border:'#e5e7eb',dot:'#9ca3af'},
  };
  let html=`<div class="tt-hero">
    <div class="tt-hero-tag">DAILY SCHEDULE</div>
    <div class="tt-hero-title">YOUR DAILY WAR PLAN</div>
    <div class="tt-hero-sub">7.7 hrs of lectures + 2.5 hrs PYQ/revision = 10.2 hrs/day<br>
    You save 182 hrs vs 1× speed — all goes into PYQs & revision</div>
    <div class="speed-badge">⚡ 1.5× SPEED ACTIVE — 75min → 50min · 60min → 40min</div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>QUANT</div>
    <div class="leg"><div class="leg-dot" style="background:#16a34a"></div>ENGLISH</div>
    <div class="leg"><div class="leg-dot" style="background:#f59e0b"></div>GK/GS</div>
    <div class="leg"><div class="leg-dot" style="background:#7c3aed"></div>REASONING</div>
    <div class="leg"><div class="leg-dot" style="background:#ef4444"></div>PYQ</div>
    <div class="leg"><div class="leg-dot" style="background:#475569"></div>REVISION</div>
  </div>
  <div class="tt-list">`;
  TT.forEach(row=>{
    const s=typeStyle[row.type]||typeStyle.brk;
    html+=`<div class="tt-row" style="background:${s.bg};border-color:${s.border}">
      <div class="tt-dot" style="background:${s.dot}"></div>
      <div><div class="tt-slot">${row.slot}</div><div class="tt-act">${row.act}</div></div>
    </div>`;
  });

  html+=`</div>`;
  return html;
}

// ============ PROGRESS ============
function renderProgress(){
  const {pct,dn,tot}=overall();
  const dc=doneCount();
  let html=`<div class="overview-grid">
    <div class="ov-card"><div class="ov-val" style="color:#d97706">${pct}%</div>
      <div class="ov-lbl">OVERALL</div><div class="ov-sub">${dn}/${tot} items</div></div>
    <div class="ov-card"><div class="ov-val" style="color:#16a34a">${dc}</div>
      <div class="ov-lbl">DAYS DONE</div><div class="ov-sub">${50-dc} remaining</div></div>
  </div>`;

  html+=`<div class="prog-section-lbl" style="color:#1d4ed8">▌ QUANT TOPICS</div>`;
  Object.entries(QT).forEach(([t,total])=>{
    const done=PLAN.flatMap(d=>d.q).filter(q=>q[0]===t&&chk[`q_${q[0]}_${q[1]}`]).length;
    const p=Math.round(done/total*100);const col=QC[t]||'#3b82f6';
    html+=`<div class="prog-item">
      <div class="prog-top">
        <div class="prog-name-row"><div class="prog-dot" style="background:${col}"></div>
          <span class="prog-name">${t}</span></div>
        <span class="prog-count" style="color:${col}">${done}/${total}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${col}"></div></div>
      <div class="prog-sub">${p}% · ${fmt(done*(t.includes('Geometry')||t.includes('Mensuration')||t.includes('Trigonometry')||t.includes('Profit')||t.includes('Work')||t.includes('Distance')?53:t.includes('Simplification')||t.includes('Statistics')||t.includes('Probability')?47:50))} watched</div>
    </div>`;
  });

  html+=`<div class="prog-section-lbl" style="color:#d97706;margin-top:8px">▌ GK/GS TOPICS</div>`;
  Object.entries(GT).forEach(([t,total])=>{
    const done=PLAN.flatMap(d=>d.g).filter(g=>g[0]===t&&chk[`g_${g[0]}_${g[1]}`]).length;
    const p=Math.round(done/total*100);const col=GC[t]||'#f59e0b';
    html+=`<div class="prog-item">
      <div class="prog-top">
        <div class="prog-name-row"><div class="prog-dot" style="background:${col}"></div>
          <span class="prog-name">${t}</span></div>
        <span class="prog-count" style="color:${col}">${done}/${total}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${col}"></div></div>
    </div>`;
  });

  html+=`<div class="prog-section-lbl" style="color:#7c3aed;margin-top:8px">▌ REASONING (25 ONE-SHOTS)</div>
  <div class="r-grid">`;
  PLAN.filter(p=>p.r).forEach(p=>{
    const done=!!chk[`r_${p.r}`];
    html+=`<div class="r-card${done?' rdone':''}">
      <div class="r-name" style="${done?'color:#16a34a':'color:#374151'}">${done?'✓ ':'○ '}${p.r}</div>
      <div class="r-day">Day ${p.day} · ${fmt(p.rm)}</div>
    </div>`;
  });
  html+=`</div>`;

  const ed=PLAN.filter(p=>chk[`eng_${p.day}`]).length;
  html+=`<div class="prog-section-lbl" style="color:#16a34a;margin-top:4px">▌ ENGLISH (${ed}/50 sessions)</div>
  <div class="eng-grid">`;
  PLAN.forEach(p=>{
    const done=!!chk[`eng_${p.day}`];
    html+=`<div class="eng-sq${done?' done':''}">${done?'✓':p.day}</div>`;
  });
  html+=`</div>`;
  return html;
}

// ============ MAIN RENDER ============
function renderMain(){
  renderHeader();
  const el=document.getElementById('main');
  if(curTab==='tracker') el.innerHTML=renderTracker();
  else if(curTab==='timetable') el.innerHTML=renderTimetable();
  else el.innerHTML=renderProgress();
}

renderMain();

// ============ SERVICE WORKER (OFFLINE) ============
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='ssc-war-v1';
const FONTS=[
  'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap'
];
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll(FONTS).catch(()=>{}))
  );
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.match(e.request).then(cached=>{
      if(cached) return cached;
      return fetch(e.request).then(res=>{
        if(res && res.status===200){
          const clone=res.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
        }
        return res;
      }).catch(()=>cached||new Response('Offline',{status:503}));
    })
  );
});
`;
  const blob=new Blob([swCode],{type:'text/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl,{scope:'./'}).catch(()=>{});
}
</script>
